services:
  mongodb:
    image: mongo:7
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    tmpfs:
      - /data/db

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=development
      - TEST_NOW_ENABLED=true
      - JWT_ACCESS_SECRET=dev-access-secret-change-me
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-me
      - FIELD_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - CORS_ALLOWLIST=http://localhost:4000,http://localhost:5173,http://frontend:5173
      - LOG_LEVEL=info
      - MEDIA_UPLOAD_DIR=/data/uploads
      - MEDIA_ENABLE_PROCESSING=false
      - PORT=4000
      - MONGO_URI=mongodb://mongodb:27017/homecareops_test
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/api/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:4000:4000"
    tmpfs:
      - /data/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - VITE_API_BASE_URL=http://api:4000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:5173 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5173:5173"

  test-runner:
    build:
      context: .
      dockerfile: test-runner/Dockerfile
    environment:
      - API_BASE_URL=http://api:4000
      - TEST_MONGO_URI=mongodb://mongodb:27017/homecareops_test
      - FRONTEND_DIR=/workspace/frontend
      - BACKEND_DIR=/workspace/backend
    depends_on:
      mongodb:
        condition: service_healthy
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    command: ["./run_tests.sh"]
